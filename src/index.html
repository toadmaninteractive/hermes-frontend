<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Hermes</title>
        <base href="/" />
        <meta content="width=device-width, initial-scale=1" name="viewport" />
        <link
            href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700|Roboto:300,400,500,600,700"
            rel="stylesheet"
        />
        <link href="https://fonts.gstatic.com" rel="preconnect" />
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined"
            rel="stylesheet"
        />
        <!-- Splash Screen | Appears during application initialization proccess -->
        <style>
            body {
                margin: 0;
                padding: 0;
            }

            #splash-screen {
                position: absolute;
                z-index: 1000;
                width: 100%;
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                background-color: var(--bs-body-bg);
            }

            #splash-screen img {
                margin-left: calc(100vw - 100%);
                margin-bottom: 30px;
            }

            #splash-screen.hidden {
                opacity: 0;
                visibility: hidden;
            }

            .splash-spinner {
                animation: rotate 2s linear infinite;
                margin-left: calc(100vw - 100%);
                width: 50px;
                height: 50px;
            }

            .splash-spinner .path {
                stroke: var(--bs-primary);
                stroke-linecap: round;
                animation: dash 1.5s ease-in-out infinite;
            }

            @keyframes rotate {
                100% {
                    transform: rotate(360deg);
                }
            }

            @keyframes dash {
                0% {
                    stroke-dasharray: 1, 150;
                    stroke-dashoffset: 0;
                }

                50% {
                    stroke-dasharray: 90, 150;
                    stroke-dashoffset: -35;
                }

                100% {
                    stroke-dasharray: 90, 150;
                    stroke-dashoffset: -124;
                }
            }
        </style>
    </head>

    <body class="mat-typography" root>
        <div id="splash-screen">
            <img alt="Hermes logo" src="./assets/media/logos/logo-hermes-dark.png" />

            <svg class="splash-spinner" viewBox="0 0 50 50">
                <circle class="path" cx="25" cy="25" fill="none" r="20" stroke-width="5"></circle>
            </svg>
        </div>
    </body>
</html>
