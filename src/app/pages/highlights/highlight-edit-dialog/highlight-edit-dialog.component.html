@if (
    {
        loading: loading$.asObservable() | async,
        changed: changed$.asObservable() | async
    };
    as x
) {
    <div>
        <h3 mat-dialog-title>{{ data ? 'Edit highlight' : 'New highlight' }}</h3>

        <button
            [disableRipple]="true"
            class="close"
            mat-icon-button
            type="button"
            (click)="dialogRef.close()"
        >
            <mat-icon>close</mat-icon>
        </button>
    </div>
    <div mat-dialog-content>
        <form
            [class.text-muted]="x.loading"
            [formGroup]="highlightForm"
        >
            <fieldset [disabled]="x.loading">
                <mat-form-field>
                    <mat-label>Title</mat-label>
                    <input
                        [formControlName]="fields.Title"
                        matInput
                        placeholder="Title"
                    />
                </mat-form-field>
                <mat-form-field>
                    <mat-label>Code</mat-label>
                    <input
                        [formControlName]="fields.Code"
                        matInput
                        placeholder="Title"
                    />
                </mat-form-field>
            </fieldset>
        </form>
    </div>
    <div
        align="end"
        mat-dialog-actions
    >
        <button
            [mat-dialog-close]="null"
            mat-button
            type="button"
        >
            No, thanks
        </button>
        <button
            [disabled]="x.loading || !x.changed || null"
            color="primary"
            mat-raised-button
            type="button"
            (click)="updateEvent$.next($event)"
        >
            {{ highlightId ? 'Save' : 'Create' }}
        </button>
    </div>
}
